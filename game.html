<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viento | Singularity Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a47e;
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg);
            font-family: 'Montserrat', sans-serif;
        }

        canvas { display: block; }

        /* ИНФО-БЛОК ПО ЦЕНТРУ */
        .info-overlay {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
            z-index: 1000; transition: transform 0.1s ease-out;
        }

        .info-overlay h2 {
            font-weight: 100; letter-spacing: 20px;
            text-transform: uppercase; margin: 0; font-size: 0.8rem;
            color: var(--gold); opacity: 0.8;
        }

        /* СТИЛИ ДЛЯ ЛОГОТИПА DV */
        .dv-logo-overlay {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999; pointer-events: none;
            opacity: 0.2; filter: blur(1px);
            transition: transform 0.15s ease-out;
        }

        .dv-logo-overlay svg text {
            fill: var(--gold); font-weight: 900; font-size: 80px;
            text-shadow: 0 0 40px rgba(197, 164, 126, 0.6);
        }

        .back-link {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            color: var(--gold); text-decoration: none;
            font-size: 0.6rem; letter-spacing: 5px;
            text-transform: uppercase; border: 1px solid rgba(197, 164, 126, 0.3);
            padding: 10px 20px; border-radius: 50px;
            transition: 0.3s; z-index: 1001;
        }

        .back-link:hover {
            background: var(--gold); color: #000;
            box-shadow: 0 0 20px rgba(197, 164, 126, 0.4);
        }
    </style>
</head>
<body>

    <div class="dv-logo-overlay" id="dvLogo">
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' width="400" height="400">
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle">DV</text>
        </svg>
    </div>

    <div class="info-overlay" id="infoBlock">
        <h2>Singularity Engine</h2>
    </div>

    <canvas id="canvas"></canvas>

    <a href="index.html" class="back-link">Вернуться в реальность</a>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const infoBlock = document.getElementById('infoBlock');
        const dvLogo = document.getElementById('dvLogo');

        let particles = [];
        const mouse = { x: null, y: null, radius: 200 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;

            // Параллакс эффект для текста и лого
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const moveX = (e.clientX - centerX) / 50;
            const moveY = (e.clientY - centerY) / 50;
            infoBlock.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;

            const dvMoveX = (e.clientX - centerX) / 80;
            const dvMoveY = (e.clientY - centerY) / 80;
            dvLogo.style.transform = `translate(calc(-50% + ${dvMoveX}px), calc(-50% + ${dvMoveY}px))`;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }

            draw() {
                ctx.fillStyle = 'rgba(197, 164, 126, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x += directionX;
                    this.y += directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 20;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 20;
                    }
                }
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].draw();
                particles[i].update();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
